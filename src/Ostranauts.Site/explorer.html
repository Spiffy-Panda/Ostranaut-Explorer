<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ostranaut Data Explorer</title>
  <!-- Theme toggle script is loaded BEFORE the stylesheet so the
       data-theme attribute is set before CSS variables resolve, avoiding
       a flash of incorrect theme. The script reads localStorage for a
       user preference; falls back to prefers-color-scheme; finally to
       "dark" via the :root + [data-theme="dark"] cascade. -->
  <script src="theme-toggle.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Ostranaut Data Explorer</h1>
    <div class="search-wrap">
      <input id="search" type="search" autocomplete="off" placeholder="search by strName or folder…">
      <ul id="search-results" hidden></ul>
    </div>
    <p class="status" id="status">loading…</p>
  </header>
  <nav id="tabs" aria-label="primary navigation">
    <a href="#/" data-tab="home" title="Search and click your way through the data tree. The default landing page.">Explorer</a>
    <a href="#/schemas" data-tab="schemas" title="What reference rules the parser learned from each folder's schema. Use this to see which folders have rich coverage and which need schema overlays.">Schemas</a>
    <a href="#/health/coverage" data-tab="coverage" title="Which folders the parser sees no edges for, and what the detector found instead. Use this to spot blind spots and pick the next schema overlay to write.">Coverage</a>
    <a href="#/health/data" data-tab="data-health" title="Dangling refs (target doesn't exist), orphans (nothing points to them), and cross-folder duplicate strNames. Often indicates data bugs or missing extractors.">Data Health</a>
    <a href="#/llm-candidates" data-tab="llm" title="Top objects by incoming-ref count, with clipboard buttons that produce self-contained LLM prompts for folder templates or per-object blurbs.">LLM Candidates</a>
    <a href="handoff/" data-tab="handoff" title="Standalone modder-facing guides. Each handoff is a self-contained HTML page covering one mod recipe or save-fix walkthrough end-to-end.">Handoffs</a>
  </nav>
  <main>
    <aside id="folders">
      <h2>Folders</h2>
      <ul id="folder-list"></ul>
    </aside>
    <section id="detail">
      <p class="hint">Pick an object from the search bar or a folder on the left.</p>
    </section>
  </main>
  <!-- v5 split payloads. All set their respective window globals via JS-wrapped JSON. -->
  <script src="data/graph.js"></script>           <!-- window.GRAPH_DATA: nodes, edges, rules -->
  <script src="data/properties.js"></script>      <!-- window.NODE_PROPS: per-node scalar fields -->
  <script src="data/code_refs.js"></script>       <!-- window.CODE_REFS: hardcoded string refs from decomp (optional) -->
  <script src="data/ref_candidates.js"></script>  <!-- window.REF_CANDIDATES: detector-derived ref candidates -->
  <script src="data/glossary.js"></script>        <!-- window.GLOSSARY: hand-seeded concept→strName cards (UX 1.1) -->
  <script src="app.js"></script>
</body>
</html>

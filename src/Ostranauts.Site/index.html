<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ostranaut Data Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Ostranaut Data Explorer</h1>
    <div class="search-wrap">
      <input id="search" type="search" autocomplete="off" placeholder="search by strName or folder…">
      <ul id="search-results" hidden></ul>
    </div>
    <p class="status" id="status">loading…</p>
  </header>
  <main>
    <aside id="folders">
      <h2>Folders</h2>
      <ul id="folder-list"></ul>
    </aside>
    <section id="detail">
      <p class="hint">Pick an object from the search bar or a folder on the left.</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>

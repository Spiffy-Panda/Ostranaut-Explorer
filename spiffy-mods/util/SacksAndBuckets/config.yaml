# Configuration for the SacksAndBuckets mod generators.
#
# Read by emit_condowners.py, emit_loot.py, emit_sprites.py, emit_items.py.
# All paths are repo-relative; the scripts resolve relative to the repo root
# (Path(__file__).resolve().parents[3]).

mod:
  out_root: spiffy-mods/mods/SacksAndBuckets/data

# Container grid sizes. Sacks are wearable; buckets are oversized/dragable.
# Vanilla's largest grid container is ItmDolly02 at 6x6 = 36; above that
# vanilla switches to IsInfiniteContainer. 16x16 = 256 is past vanilla's
# tested envelope and is empirically untested (the inventory UI may not
# render that many cells cleanly). Dial back if it breaks.
dimensions:
  sack:
    height: 8     # 8x8 = 64 slots, 4x the vanilla 16-slot backpack
    width: 4
  bucket:
    height: 16    # 16x16 = 256 slots, 16x the vanilla backpack
    width: 4

# Stock-table parameters for the kiosk's aLoots.
kiosk_stock:
  sack_chance: 1.0
  sack_count_min: 1
  sack_count_max: 2
  bucket_chance: 0.5
  bucket_count_min: 1
  bucket_count_max: 1

# Sprite generation. Fully procedural: emit_sprites.py draws each sack
# and bucket from PIL primitives, fills with the item's `color`, and
# stamps a 2-char `label` in the center. No vanilla PNG extraction
# required.
sprite_gen:
  # Where the generated sprites land. Per DataHandler.LoadPNG (decomp at
  # DataHandler.cs:1196), the runtime looks for images at
  # <modroot>/images/<strImg>.png -- so the output dir is the mod's
  # images/ folder (a *sibling* of data/, not under it).
  output_dir: spiffy-mods/mods/SacksAndBuckets/images

  # Canvas size in pixels (square). 64 is a comfortable default --
  # readable label, recognisable shape. Drop to 32 for a chunkier
  # pixel-art feel.
  sprite_size: 16

  # Label point size. Should be ~1/3 of sprite_size for legibility.
  label_size: 5

# The 12 item types. Each entry produces:
#   * 1 sack CO + 1 bucket CO (in condowners.json)
#   * 1 fit-gate condtrig (in condtrigs.json -- already shipped, not
#     generated; this list mirrors what's there)
#   * 2 self-emit loot wrappers (sack + bucket, in loot_self_reference.json)
#   * 2 stock lines in ItmSacksKioskInv aLoots (sack + bucket)
#   * 2 generated sprite PNGs (sack + bucket, blended from base + sprite_source)
#
# Field meanings:
#   suffix  -- appended to ItmSack / ItmBucket; also the strName suffix
#              of the fit-gate (TIsFitContainer<suffix>).
#   source  -- the vanilla *condowner* strName this container is "for".
#              Documentary; not used by generators.
#   gate    -- TIsFitContainer<suffix> condtrig the sack/bucket points
#              its strContainerCT at.
#   noun    -- plural noun used in strNameFriendly / strDesc.
#   color   -- hex RGB string. emit_sprites.py fills the sack/bucket
#              body with this colour. Pick something distinct +
#              evocative of the held material; the label provides the
#              tiebreaker for similar colours.
#   label   -- exactly 2 characters. Stamped centred on every sprite
#              of this type. Designed so a player can identify the
#              contents at a glance even if colours blur.
items:
  - suffix: Trash
    source: ItmScrapTrash
    gate: TIsFitContainerTrash
    noun: trash
    color: "#6B5B3E"     # muddy brown
    label: TR
  - suffix: PartsMechSmall
    source: ItmPartsMechSmall01
    gate: TIsFitContainerPartsMechSmall
    noun: small mech parts
    color: "#696969"     # dim gray (mechanical)
    label: MP
  - suffix: ScrapSteel
    source: ItmScrapSteel
    gate: TIsFitContainerScrapSteel
    noun: steel scrap
    color: "#8B8B8B"     # steel gray
    label: SS
  - suffix: PartsElecSmall
    source: ItmPartsElecSmall01
    gate: TIsFitContainerPartsElecSmall
    noun: small elec parts
    color: "#2E8B57"     # sea green (elec parts often have green PCB)
    label: EP
  - suffix: ComponentMobo
    source: ItmComponentMobo01
    gate: TIsFitContainerComponentMobo
    noun: motherboards
    color: "#1A5F3F"     # dark green (PCB substrate)
    label: MB
  - suffix: ScrapAluminum
    source: ItmScrapAluminum
    gate: TIsFitContainerScrapAluminum
    noun: aluminum scrap
    color: "#C0C0C0"     # silver
    label: SA
  - suffix: ComponentMotor
    source: ItmComponentMotor01
    gate: TIsFitContainerComponentMotor
    noun: small motors
    color: "#B87333"     # copper
    label: MT
  - suffix: HeatSink
    source: ItmHeatSink01
    gate: TIsFitContainerHeatSink
    noun: heat sinks
    color: "#708090"     # slate gray (anodized aluminum)
    label: HS
  - suffix: ScrapCarbonFiber
    source: ItmScrapCarbonFiber
    gate: TIsFitContainerScrapCarbonFiber
    noun: carbon fiber scrap
    color: "#1C1C1C"     # near-black
    label: CF
  - suffix: PartsScreen
    source: ItmPartsScreen01
    gate: TIsFitContainerPartsScreen
    noun: screen fragments
    color: "#1E3A5F"     # dark blue (screen glass)
    label: SC
  - suffix: ScrapPlastic
    source: ItmScrapPlastic
    gate: TIsFitContainerScrapPlastic
    noun: plastic scrap
    color: "#DAA520"     # goldenrod (yellow-tinted plastic)
    label: PL
  - suffix: ScrapClothDirty
    source: ItmScrapClothDirty
    gate: TIsFitContainerScrapClothDirty
    noun: dirty cloth scraps
    color: "#C2B280"     # dirty tan
    label: CL

# The kiosk CO. Modeled on ItmKioskSupplies01 but with crate-shape
# spawnability (no IsInstalled, has IsOversized/IsRigid) so
# `spawn ItmSacksKiosk01` actually drops it on the floor.
#
# strItemDef points at our OWN ItmSacksKiosk01 ItemDef (emitted by
# emit_items.py with empty sockets), not vanilla ItmKioskSupplies01
# whose aSocketReqs demands TILWall on the top row + TILFloor below
# -- that's what blocked drop-anywhere placement when the kiosk's
# strItemDef aliased the vanilla one.
#
# strImg is the sprite filename for the ItemDef we emit. Pointing at
# "ItmKioskSupplies01" lets the runtime fall through to vanilla art
# (LoadPNG iterates aModPaths and shares dictImages, so 'core'
# loaded first will already have that PNG resolved). To ship custom
# kiosk art instead, change strImg to ItmSacksKiosk01 and add a
# kiosk row to emit_sprites.py.
kiosk:
  strName: ItmSacksKiosk01
  strImg: ItmKioskSupplies01        # vanilla art passthrough via shared image dict
  guipropmap: TraderSacksKiosk
  stock_table: ItmSacksKioskInv

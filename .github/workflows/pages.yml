name: Deploy public site to GitHub Pages

# Builds and deploys the static "public bundle" (site frame + cover + handoffs
# + empty data stubs). The C# parser never runs here — the runner doesn't have
# the game tree, and shouldn't, since the game data isn't redistributable.
# See CLAUDE.md "Pre-push check — four-factor fair use review".

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build public bundle
        run: make site-public
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build-public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
